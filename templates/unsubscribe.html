<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe — CoPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md mx-auto text-center p-8">
        <span class="text-2xl font-bold text-indigo-600">CoPI</span>
        {% if success %}
        <div class="mt-8">
            <h1 class="text-xl font-semibold text-gray-900 mb-2">Unsubscribed</h1>
            <p class="text-gray-600 text-sm">
                You will no longer receive proposal notification emails.
                You can re-enable notifications anytime from your
                <a href="/settings" class="text-indigo-600 hover:text-indigo-700 underline">settings</a>.
            </p>
        </div>
        {% else %}
        <div class="mt-8">
            <h1 class="text-xl font-semibold text-gray-900 mb-2">Unsubscribe failed</h1>
            <p class="text-gray-600 text-sm">{{ error }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
