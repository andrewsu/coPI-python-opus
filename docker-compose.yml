version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-copi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copi}
      POSTGRES_DB: ${POSTGRES_DB:-copi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copi"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    env_file: .env
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: python -m src.worker.main
    env_file: .env
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  agent:
    build: .
    command: python -m src.agent.main
    env_file: .env
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - agent

  grantbot:
    build: .
    command: python -m src.agent.grantbot scheduler --run-hour 8 --max-per-channel 1
    env_file: .env
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
    depends_on:
      postgres:
        condition: service_healthy

  podcast:
    build: .
    command: python -m src.podcast.main scheduler --run-hour 9
    env_file: .env
    environment:
      # Override LOCAL_TTS_HOST so the container can reach a vLLM-Omni server
      # running on the host machine (127.0.0.1 does not reach the host from inside Docker).
      LOCAL_TTS_HOST: host.docker.internal
    extra_hosts:
      # Ensures host.docker.internal resolves on Linux (Docker Desktop sets it automatically on Mac/Windows).
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
