version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: copi
      POSTGRES_PASSWORD: copi
      POSTGRES_DB: copi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copi"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://copi:copi@postgres:5432/copi
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: python -m src.worker.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://copi:copi@postgres:5432/copi
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  agent:
    build: .
    command: python -m src.agent.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://copi:copi@postgres:5432/copi
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - agent

  grantbot:
    build: .
    command: python -m src.agent.grantbot scheduler --run-hour 8 --max-per-channel 1
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://copi:copi@postgres:5432/copi
    volumes:
      - .:/app
      - ./profiles:/app/profiles
      - ./prompts:/app/prompts
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
